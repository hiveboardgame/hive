name: format check
on: pull_request

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with: 
          components: rustfmt, leptosfmt
      - run: cargo fmt --check && leptosfmt apis -q --check
